name: CI/CD

# Triggers:
# - push (any branch)       -> tests always run
# - pull_request into main  -> tests always run
# Building + pushing Docker images + deployment only run on a push to main
# (typically when a PR is merged) — see the `vars` job.
on:
  push:
  pull_request:
    branches: [main]
jobs:
  # ── Backend tests (FastAPI / pytest, against a real Postgres) ────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: racelab_test
          POSTGRES_USER: racelab
          POSTGRES_PASSWORD: racelab_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racelab -d racelab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        working-directory: Backend
        run: pip install -r requirements.txt

      - name: Run test suite
        working-directory: Backend
        env:
          TEST_DATABASE_URL: postgresql://racelab:racelab_secret@localhost:5432/racelab_test
        run: pytest

  # ── Frontend tests (typecheck + lint + Vitest unit tests) ─────────────────────
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Lint
        working-directory: Frontend
        run: npm run lint

      - name: Typecheck
        working-directory: Frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: Frontend
        run: npm run test

  # ── Compute the image names once, shared by all build jobs ───────────────────
  vars:
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.set.outputs.backend_image }}
      frontend_image: ${{ steps.set.outputs.frontend_image }}
    steps:
      # Without DOCKER_REGISTRY (Docker Hub case): no prefix -> "zastial/racelab-backend".
      # With DOCKER_REGISTRY (private registry, ghcr.io...): "my-registry.com/zastial/racelab-backend".
      - name: Set image names
        id: set
        run: |
          PREFIX="${{ vars.DOCKER_REGISTRY }}"
          if [ -n "$PREFIX" ]; then PREFIX="$PREFIX/"; fi
          echo "backend_image=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-frontend" >> "$GITHUB_OUTPUT"

  # ── Build backend per architecture, on native runners (no QEMU emulation
  #    -> much faster than the old single-job multi-arch build). Each job
  #    only pushes its digest; the final multi-arch manifest is assembled by
  #    the merge-backend job below.
  build-backend:
    needs: vars
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build + push (by digest)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}
          outputs: type=image,name=${{ needs.vars.outputs.backend_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-backend-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge the amd64 + arm64 digests into a single multi-arch image ───────────
  merge-backend:
    needs: [vars, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-backend-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Backend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.vars.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create + push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.vars.outputs.backend_image }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Same for the frontend ─────────────────────────────────────────────────
  build-frontend:
    needs: vars
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build + push (by digest)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          outputs: type=image,name=${{ needs.vars.outputs.frontend_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-frontend-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    needs: [vars, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-frontend-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.vars.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Create + push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.vars.outputs.frontend_image }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Deployment to the VPS via SSH (replaces the old webhook) ─────────────────
  deploy:
    needs: [merge-backend, merge-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to the VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/ubuntu/racelab
            ./deploy/deploy.sh

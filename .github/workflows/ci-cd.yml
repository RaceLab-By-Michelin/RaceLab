name: CI/CD

# Déclencheurs :
# - push sur main           -> tests puis build + push des images Docker
# - pull_request vers main  -> tests uniquement (pas de push d'image)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests backend (FastAPI / pytest, contre un vrai Postgres) ────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: racelab_test
          POSTGRES_USER: racelab
          POSTGRES_PASSWORD: racelab_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racelab -d racelab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Installer les dépendances
        working-directory: Backend
        run: pip install -r requirements.txt

      # - name: Lancer la suite de tests
      #   working-directory: Backend
      #   env:
      #     TEST_DATABASE_URL: postgresql://racelab:racelab_secret@localhost:5432/racelab_test
      #   run: pytest

  # ── Tests frontend (typecheck + lint + tests unitaires Vitest) ───────────────
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: Frontend
        run: npm ci

      # - name: Lint
      #   working-directory: Frontend
      #   run: npm run lint

      # - name: Typecheck
      #   working-directory: Frontend
      #   run: npm run typecheck

      # - name: Tests unitaires
      #   working-directory: Frontend
      #   run: npm run test

  # ── Calcule une fois le nom des images, partagé par tous les jobs de build ───
  vars:
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.set.outputs.backend_image }}
      frontend_image: ${{ steps.set.outputs.frontend_image }}
    steps:
      # Sans DOCKER_REGISTRY (cas Docker Hub) : pas de préfixe -> "zastial/racelab-backend".
      # Avec DOCKER_REGISTRY (registry privé, ghcr.io...) : "mon-registry.com/zastial/racelab-backend".
      - name: Définir le nom des images
        id: set
        run: |
          PREFIX="${{ vars.DOCKER_REGISTRY }}"
          if [ -n "$PREFIX" ]; then PREFIX="$PREFIX/"; fi
          echo "backend_image=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-frontend" >> "$GITHUB_OUTPUT"

  # ── Build backend par architecture, sur des runners natifs (pas d'émulation
  #    QEMU -> beaucoup plus rapide que l'ancienne build multi-arch en un seul
  #    job). Chaque job pousse uniquement son digest, le manifest multi-arch
  #    final est assemblé par le job merge-backend ci-dessous.
  build-backend:
    needs: vars
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Connexion au registry Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build + push (par digest)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}
          outputs: type=image,name=${{ needs.vars.outputs.backend_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Exporter le digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload du digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-backend-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Assemble les digests amd64 + arm64 en une seule image multi-arch ─────────
  merge-backend:
    needs: [vars, build-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger les digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-backend-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Connexion au registry Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Métadonnées image backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.vars.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Créer + pousser le manifest multi-arch
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.vars.outputs.backend_image }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Idem pour le frontend ──────────────────────────────────────────────────
  build-frontend:
    needs: vars
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Connexion au registry Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build + push (par digest)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          outputs: type=image,name=${{ needs.vars.outputs.frontend_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Exporter le digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload du digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-frontend-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    needs: [vars, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger les digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-frontend-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Connexion au registry Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Métadonnées image frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.vars.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Créer + pousser le manifest multi-arch
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.vars.outputs.frontend_image }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Déploiement sur le VPS via SSH (remplace l'ancien webhook) ────────────
  deploy:
    needs: [merge-backend, merge-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /home/ubuntu/racelab
            ./deploy/deploy.sh

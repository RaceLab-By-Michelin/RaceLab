name: CI/CD

# Déclencheurs :
# - push sur main           -> tests puis build + push des images Docker
# - pull_request vers main  -> tests uniquement (pas de push d'image)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests backend (FastAPI / pytest, contre un vrai Postgres) ────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: racelab_test
          POSTGRES_USER: racelab
          POSTGRES_PASSWORD: racelab_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racelab -d racelab_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Installer les dépendances
        working-directory: Backend
        run: pip install -r requirements.txt

      # - name: Lancer la suite de tests
      #   working-directory: Backend
      #   env:
      #     TEST_DATABASE_URL: postgresql://racelab:racelab_secret@localhost:5432/racelab_test
      #   run: pytest

  # ── Tests frontend (typecheck + lint + tests unitaires Vitest) ───────────────
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: Frontend
        run: npm ci

      # - name: Lint
      #   working-directory: Frontend
      #   run: npm run lint

      # - name: Typecheck
      #   working-directory: Frontend
      #   run: npm run typecheck

      # - name: Tests unitaires
      #   working-directory: Frontend
      #   run: npm run test

  # ── Build + push des images Docker (uniquement sur push vers main) ───────────
  build-and-push:
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Sans DOCKER_REGISTRY (cas Docker Hub) : pas de préfixe -> "zastial/racelab-backend".
      # Avec DOCKER_REGISTRY (registry privé, ghcr.io...) : "mon-registry.com/zastial/racelab-backend".
      - name: Définir le nom des images
        run: |
          PREFIX="${{ vars.DOCKER_REGISTRY }}"
          if [ -n "$PREFIX" ]; then PREFIX="$PREFIX/"; fi
          echo "BACKEND_IMAGE=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${PREFIX}${{ vars.DOCKER_NAMESPACE }}/racelab-frontend" >> "$GITHUB_ENV"

      - name: Connexion au registry Docker
        uses: docker/login-action@v3
        with:
          # Champ vide -> docker/login-action se connecte à Docker Hub par défaut.
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Métadonnées image backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build + push backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Métadonnées image frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build + push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  # ── Déclenche le webhook de déploiement sur le VPS ────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Appel du webhook (HMAC signé)
        env:
          WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          BODY='{"ref":"${{ github.sha }}"}'
          SIG="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')"
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$BODY"

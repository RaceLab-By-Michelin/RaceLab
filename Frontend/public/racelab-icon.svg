<svg viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Fond sombre -->
  

  <!-- RACELAB - texte principal bold italic -->
  <text x="60" y="118" font-family="'Arial Black', 'Impact', sans-serif" font-size="72" font-weight="900" font-style="italic" fill="#FFFFFF" letter-spacing="-1">RACELAB</text>

  <!-- by Michelin - texte secondaire, élégant -->
  <text x="63" y="143" font-family="'Arial', sans-serif" font-size="17" font-weight="400" fill="#F5D000" letter-spacing="6">by MICHELIN</text>

  <!-- Vélo minimaliste en trait blanc -->
  <!-- Roue arrière -->
  <circle cx="188" cy="200" r="32" fill="none" stroke="#FFFFFF" stroke-width="2.5"></circle>
  <circle cx="188" cy="200" r="4" fill="#FFFFFF"></circle>

  <!-- Roue avant -->
  <circle cx="310" cy="200" r="32" fill="none" stroke="#FFFFFF" stroke-width="2.5"></circle>
  <circle cx="310" cy="200" r="4" fill="#FFFFFF"></circle>

  <!-- Cadre vélo -->
  <!-- Tube de selle -->
  <line x1="225" y1="168" x2="218" y2="200" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
  <!-- Tube supérieur -->
  <line x1="225" y1="168" x2="278" y2="162" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
  <!-- Tube diagonal -->
  <line x1="278" y1="162" x2="218" y2="200" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
  <!-- Bases -->
  <line x1="218" y1="200" x2="188" y2="200" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
  <!-- Haubans -->
  <line x1="225" y1="168" x2="188" y2="200" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"></line>
  <!-- Fourche avant -->
  <line x1="278" y1="162" x2="310" y2="200" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>

  <!-- Potence + guidon -->
  <line x1="278" y1="162" x2="285" y2="155" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
  <line x1="282" y1="152" x2="292" y2="152" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>

  <!-- Selle -->
  <line x1="219" y1="163" x2="235" y2="163" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"></line>
  <line x1="225" y1="168" x2="225" y2="163" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>

  <!-- Pédalier jaune -->
  <circle cx="232" cy="200" r="7" fill="none" stroke="#F5D000" stroke-width="2"></circle>

  <!-- Ligne jaune décorative style Michelin -->
  <line x1="60" y1="238" x2="540" y2="238" stroke="#F5D000" stroke-width="2"></line>

</svg>